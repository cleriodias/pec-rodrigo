name: Deploy to KingHost

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FTP_SERVER: ftp.paoecafe83.com.br
  FTP_USERNAME: paoecafe83
  FTP_PORT: 21
  FTP_SERVER_DIR: /
  PHP_VERSION: '8.2'
  NODE_VERSION: '20'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, bcmath, openssl, pdo_mysql, tokenizer, xml, ctype, json
          tools: composer

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node packages
        run: NODE_ENV=development npm ci

      - name: Build frontend assets
        run: NODE_ENV=production npm run build

      - name: Remove cached Laravel files
        run: |
          rm -f bootstrap/cache/config.php
          rm -f bootstrap/cache/routes.php
          rm -f bootstrap/cache/routes-*.php
          rm -f bootstrap/cache/events.php

      - name: Prepare deployment package
        run: |
          rm -rf artifacts
          mkdir -p artifacts/staging
          rsync -a . artifacts/staging \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "artifacts" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude ".vite" \
            --exclude "public/hot" \
            --exclude "bkp" \
            --exclude "mobile-faturamento" \
            --exclude "tests" \
            --exclude "*.md" \
            --exclude "*.zip" \
            --exclude "*.pfx" \
            --exclude "*.sql" \
            --exclude "tmp_*" \
            --exclude "dashboard_lines.txt" \
            --exclude "temp.txt" \
            --exclude "_.ssh_" \
            --exclude "storage/framework/cache/*" \
            --exclude "storage/framework/sessions/*" \
            --exclude "storage/framework/views/*" \
            --exclude "storage/logs" \
            --exclude "vendor/bin"
          rm -rf artifacts/staging/public/storage
          mkdir -p artifacts/staging/public/storage
          touch artifacts/staging/public/storage/.gitkeep

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ env.FTP_SERVER }}
          username: ${{ env.FTP_USERNAME }}
          password: ${{ secrets.KINGHOST_FTP_PASSWORD }}
          port: ${{ env.FTP_PORT }}
          protocol: ftp
          local-dir: artifacts/staging/
          server-dir: ${{ env.FTP_SERVER_DIR }}
          log-level: verbose
