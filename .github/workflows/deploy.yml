name: Deploy to Azure Web App

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AZURE_RESOURCE_GROUP: rg-pec-rodrigo
  AZURE_WEBAPP_NAME: PEC83
  AZURE_APP_SERVICE_PLAN_ID: /subscriptions/51242591-9d16-401e-91da-fd5b6083c135/resourceGroups/rg-pec-rodrigo/providers/Microsoft.Web/serverfarms/sp-rodrigo-pec

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Provision App Service (Bicep)
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          az deployment group create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters appName="$AZURE_WEBAPP_NAME" \
                         location="Brazil South" \
                         appServicePlanId="$AZURE_APP_SERVICE_PLAN_ID"

      - name: Enable App Service logging
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          az webapp log config \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --application-logging filesystem \
            --web-server-logging filesystem \
            --detailed-error-messages true \
            --failed-request-tracing true

      - name: Configure App Service environment
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          APP_KEY: ${{ secrets.LARAVEL_APP_KEY }}
          APP_URL: ${{ secrets.APP_URL }}
          DB_CONNECTION: ${{ secrets.DB_CONNECTION }}
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_PORT: ${{ secrets.DB_PORT }}
          DB_DATABASE: ${{ secrets.DB_DATABASE }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          if [ -z "$APP_KEY" ]; then
            echo "Secret LARAVEL_APP_KEY nao configurada."
            exit 1
          fi
          if [ -z "$DB_CONNECTION" ] || [ -z "$DB_HOST" ] || [ -z "$DB_DATABASE" ] || [ -z "$DB_USERNAME" ]; then
            echo "Secrets de banco incompletas (DB_CONNECTION, DB_HOST, DB_DATABASE, DB_USERNAME)."
            exit 1
          fi
          if [ -z "$APP_URL" ]; then
            APP_URL="https://${AZURE_WEBAPP_NAME}.azurewebsites.net"
          fi
          if [ -z "$DB_PORT" ]; then
            DB_PORT="3306"
          fi
          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings \
              APP_ENV=production \
              APP_DEBUG=false \
              APP_URL="$APP_URL" \
              LOG_CHANNEL=single \
              LOG_LEVEL=debug \
              SESSION_DRIVER=file \
              CACHE_STORE=file \
              QUEUE_CONNECTION=sync \
              APP_STORAGE="/home/site/storage" \
              APP_KEY="$APP_KEY" \
              DB_CONNECTION="$DB_CONNECTION" \
              DB_HOST="$DB_HOST" \
              DB_PORT="$DB_PORT" \
              DB_DATABASE="$DB_DATABASE" \
              DB_USERNAME="$DB_USERNAME" \
              DB_PASSWORD="$DB_PASSWORD" \
            --output none

      - name: Configurar Nginx (rewrite Laravel)
        run: |
          chmod +x start.sh
          az webapp config set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --startup-file "bash /home/site/wwwroot/start.sh"

          az webapp config appsettings set \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --settings \
              WEBSITE_NGINX_CONFIG_PATH="/home/site/wwwroot/nginx.conf" \
              WEBSITES_PORT="8080" \
              WEBSITE_DOCUMENT_ROOT="/home/site/wwwroot/public" \
              WEBSITE_RUN_FROM_PACKAGE="0" \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE="true" \
              APP_STORAGE="/home/site/storage"

      - name: Wait for App Service to settle
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: sleep 90

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, openssl, pdo_mysql, tokenizer, xml, ctype, json

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node packages
        run: NODE_ENV=development npm ci

      - name: Build frontend assets
        run: NODE_ENV=production npm run build

      - name: Verify built frontend assets
        run: |
          test -f public/build/manifest.json
          test -f public/favicon.ico
          ls -lah public
          ls -lah public/build
          ls -lah public/build/assets | sed -n '1,40p'

      - name: Remove cached Laravel files
        run: |
          rm -f bootstrap/cache/config.php
          rm -f bootstrap/cache/routes.php
          rm -f bootstrap/cache/routes-*.php
          rm -f bootstrap/cache/events.php

      - name: Prepare deployment package
        run: |
          rm -rf artifacts
          mkdir -p artifacts/staging
          rsync -a . artifacts/staging \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "artifacts" \
            --exclude "node_modules" \
            --exclude ".env" \
            --exclude "storage/logs" \
            --exclude "vendor/bin"
          rm -rf artifacts/staging/public/storage
          mkdir -p artifacts/staging/public/storage
          touch artifacts/staging/public/storage/.gitkeep
          (cd artifacts/staging && zip -r ../app.zip .)

      - name: Verify deployment package contents
        run: |
          test -f artifacts/staging/public/build/manifest.json
          unzip -l artifacts/app.zip | grep "public/build/manifest.json"
          unzip -l artifacts/app.zip | grep "public/favicon.ico"
          unzip -l artifacts/app.zip | grep "public/build/assets/app-"

      - name: Deploy package (Zip Deploy)
        run: |
          max_attempts=5
          delay=20
          for attempt in $(seq 1 $max_attempts); do
            echo "Deploy attempt $attempt of $max_attempts"
            if az webapp deploy \
              --resource-group "$AZURE_RESOURCE_GROUP" \
              --name "$AZURE_WEBAPP_NAME" \
              --type zip \
              --clean true \
              --restart true \
              --track-status true \
              --src-path artifacts/app.zip; then
              echo "Deploy succeeded"
              exit 0
            fi
            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Deploy failed. Waiting ${delay}s before retry..."
              sleep "$delay"
              delay=$((delay * 2))
            fi
          done
          echo "Deploy failed after $max_attempts attempts."
          exit 1

      - name: Validate deployed assets
        run: |
          az webapp restart \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME"

          APP_ASSET=$(node -e "const m=require('./public/build/manifest.json'); console.log(m['resources/js/app.jsx'].file)")
          APP_CSS=$(node -e "const m=require('./public/build/manifest.json'); console.log(m['resources/js/app.jsx'].css[0])")
          WELCOME_ASSET=$(node -e "const m=require('./public/build/manifest.json'); console.log(m['resources/js/Pages/Welcome.jsx'].file)")
          HOSTNAME=$(echo "${AZURE_WEBAPP_NAME}.azurewebsites.net" | tr '[:upper:]' '[:lower:]')
          BASE_URL="https://${HOSTNAME}"
          SCM_URL="https://${HOSTNAME/.azurewebsites.net/.scm.azurewebsites.net}"

          echo "Startup command atual:"
          az webapp config show \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --query "{appCommandLine:appCommandLine,linuxFxVersion:linuxFxVersion}" \
            -o json

          echo "App settings relevantes:"
          az webapp config appsettings list \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --query "[?name=='WEBSITE_DOCUMENT_ROOT' || name=='WEBSITE_RUN_FROM_PACKAGE' || name=='WEBSITES_ENABLE_APP_SERVICE_STORAGE' || name=='WEBSITES_PORT' || name=='WEBSITE_NGINX_CONFIG_PATH' || name=='APP_STORAGE' || name=='SCM_DO_BUILD_DURING_DEPLOYMENT'].[name,value]" \
            -o table

          PUBLISH_USER=$(az webapp deployment list-publishing-credentials \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --query publishingUserName -o tsv)
          PUBLISH_PASS=$(az webapp deployment list-publishing-credentials \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --name "$AZURE_WEBAPP_NAME" \
            --query publishingPassword -o tsv)

          fetch_status() {
            local url="$1"
            local output_file="$2"
            curl -sS -L -o "$output_file" -w "%{http_code}" "$url" || true
          }

          echo "Inspecao remota do wwwroot via Kudu:"
          curl -fsS -u "$PUBLISH_USER:$PUBLISH_PASS" \
            -H "Content-Type: application/json" \
            -d "{\"command\":\"pwd && ls -lah /home/site/wwwroot && echo '--- public ---' && ls -lah /home/site/wwwroot/public && echo '--- build ---' && ls -lah /home/site/wwwroot/public/build && echo '--- assets ---' && ls -lah /home/site/wwwroot/public/build/assets | sed -n '1,40p'\",\"dir\":\"/home/site/wwwroot\"}" \
            "${SCM_URL}/api/command" \
            -o /tmp/kudu-command.json
          cat /tmp/kudu-command.json

          echo "Checando arquivos criticos via Kudu VFS:"
          INDEX_STATUS=$(curl -sS -u "$PUBLISH_USER:$PUBLISH_PASS" -o /tmp/kudu-index.txt -w "%{http_code}" "${SCM_URL}/api/vfs/site/wwwroot/public/index.php" || true)
          MANIFEST_STATUS=$(curl -sS -u "$PUBLISH_USER:$PUBLISH_PASS" -o /tmp/kudu-manifest.json -w "%{http_code}" "${SCM_URL}/api/vfs/site/wwwroot/public/build/manifest.json" || true)
          START_STATUS=$(curl -sS -u "$PUBLISH_USER:$PUBLISH_PASS" -o /tmp/kudu-start.sh -w "%{http_code}" "${SCM_URL}/api/vfs/site/wwwroot/start.sh" || true)
          NGINX_STATUS=$(curl -sS -u "$PUBLISH_USER:$PUBLISH_PASS" -o /tmp/kudu-nginx.conf -w "%{http_code}" "${SCM_URL}/api/vfs/site/wwwroot/nginx.conf" || true)
          echo "index.php via Kudu: ${INDEX_STATUS}"
          echo "manifest.json via Kudu: ${MANIFEST_STATUS}"
          echo "start.sh via Kudu: ${START_STATUS}"
          echo "nginx.conf via Kudu: ${NGINX_STATUS}"

          health_attempts=20
          health_delay=15

          for attempt in $(seq 1 $health_attempts); do
            echo "Warmup da aplicacao: tentativa $attempt de $health_attempts"
            STATUS=$(fetch_status "${BASE_URL}/up" /tmp/up.html)
            echo "Status /up: ${STATUS}"

            if [ "$STATUS" = "200" ]; then
              echo "Aplicacao respondeu no endpoint de saude."
              break
            fi

            if [ "$attempt" -eq "$health_attempts" ]; then
              echo "A aplicacao nao respondeu com sucesso no endpoint /up."
              sed -n '1,120p' /tmp/up.html || true
              exit 1
            fi

            sleep "$health_delay"
          done

          manifest_attempts=10
          manifest_delay=10

          for attempt in $(seq 1 $manifest_attempts); do
            echo "Validacao do manifest publicado: tentativa $attempt de $manifest_attempts"
            STATUS=$(fetch_status "${BASE_URL}/build/manifest.json" /tmp/manifest-live.json)
            echo "Status manifest: ${STATUS}"

            if [ "$STATUS" = "200" ] && grep -q "$APP_ASSET" /tmp/manifest-live.json; then
              echo "Manifest publicado confere com a build."
              break
            fi

            if [ "$attempt" -eq "$manifest_attempts" ]; then
              echo "Manifest publicado nao corresponde a build esperada."
              echo "Asset principal esperado: $APP_ASSET"
              sed -n '1,160p' /tmp/manifest-live.json || true
              exit 1
            fi

            sleep "$manifest_delay"
          done

          max_attempts=12
          delay=10

          for attempt in $(seq 1 $max_attempts); do
            echo "Validacao final da home e dos assets: tentativa $attempt de $max_attempts"

            STATUS=$(fetch_status "${BASE_URL}/" /tmp/home.html)
            echo "Status home: ${STATUS}"

            if [ "$STATUS" = "200" ] \
              && grep -q "$APP_ASSET" /tmp/home.html \
              && grep -q "$APP_CSS" /tmp/home.html \
              && curl -fsSI "${BASE_URL}/build/${APP_ASSET}" >/tmp/app_asset_headers.txt \
              && curl -fsSI "${BASE_URL}/build/${APP_CSS}" >/tmp/app_css_headers.txt \
              && curl -fsSI "${BASE_URL}/build/${WELCOME_ASSET}" >/tmp/welcome_asset_headers.txt; then
              echo "Assets publicados e acessiveis."
              exit 0
            fi

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "Deploy ainda nao estabilizou. Aguardando ${delay}s..."
              sleep "$delay"
            fi
          done

          echo "Falha ao validar os assets publicados."
          echo "Asset principal esperado: $APP_ASSET"
          echo "CSS principal esperado: $APP_CSS"
          echo "Asset Welcome esperado: $WELCOME_ASSET"
          echo "Ultimo HTML recebido:"
          sed -n '1,120p' /tmp/home.html || true
          echo "Ultimo manifest recebido:"
          sed -n '1,160p' /tmp/manifest-live.json || true
          echo "Headers do app asset:"
          cat /tmp/app_asset_headers.txt || true
          echo "Headers do css:"
          cat /tmp/app_css_headers.txt || true
          echo "Headers do Welcome:"
          cat /tmp/welcome_asset_headers.txt || true
          exit 1
